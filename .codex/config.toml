# .codex/config.toml — Project-level Codex config for LittlePea Pipeline
# Canonical Codex project config for this repository

# ─── Model & Policy ────────────────────────────────────────────
model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# ─── Agents Global Settings ────────────────────────────────────
max_threads = 6
max_depth = 1

# ─── Project Doc Discovery ─────────────────────────────────────
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["AGENTS.md"]

# ─── Features ──────────────────────────────────────────────────
[features]
multi_agent = true
